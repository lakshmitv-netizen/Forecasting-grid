<html lang="en">

        * {

            padding: 0;

        .grid-container {

            border: 1px solid #A0A0A0;

        }

        .grid-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .grid-header {
            background-color: #ededed !important;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3) !important;
            border-bottom: 1px solid #D0D0D0 !important;
        }

        .grid-table th {
            background-color: #d0d0d0 !important;
            padding: clamp(5px, calc(5px + 4px * (100vh - 600px) / 600px), 9px) clamp(7px, calc(7px + 5px * (100vh - 600px) / 600px), 12px);
            text-align: left;
            font-weight: 700 !important;
            font-size: 14px !important;
            color: #000000 !important;
            line-height: 20px !important;
            border-right: 2px solid #808080 !important;
            border-top: 2px solid #808080 !important;
            border-bottom: 2px solid #808080 !important;
            position: sticky;
            top: 0;
            z-index: 10;
            white-space: nowrap;
        }

        .grid-table th:first-child {
            min-width: 400px !important;
            max-width: 400px !important;
            width: 400px !important;
            position: sticky;
            left: 0;
            top: 0;
            z-index: 20;
        }

        .grid-table td:first-child {
            z-index: 5;
        }

        .grid-table th:not(:first-child) {
            text-align: center;
            min-width: 100px;
        }

        .grid-table td {
            padding: clamp(5px, calc(5px + 4px * (100vh - 600px) / 600px), 9px) clamp(7px, calc(7px + 5px * (100vh - 600px) / 600px), 12px);
            border-right: 1px solid #808080 !important;
            border-top: 1px solid #808080 !important;
            border-bottom: 1px solid #808080 !important;
            border-width: 1px 1px 1px 0 !important;
            vertical-align: middle;
            background-color: inherit !important;
            min-height: clamp(18px, calc(18px + 14px * (100vh - 600px) / 600px), 32px);
        }

        .grid-table td:first-child {
            position: sticky;
            left: 0;
            z-index: 5;
            background-color: white !important;
            min-width: 400px !important;
            max-width: 400px !important;
            width: 400px !important;
            border-right: 2px solid #808080 !important;
        }

        .row-measure-parent {
            background-color: #D0D0D0 !important;
            font-weight: 600 !important;
        }

        .row-measure-parent td {
            background-color: #D0D0D0 !important;
            border-left: none !important;
            border-right: none !important;
        }

        .row-measure-parent td:first-child {
            background-color: #D0D0D0 !important;
            border-left: none !important;
            border-right: 2px solid #808080 !important;
        }

        .row-measure {
            background-color: #E0E0E0 !important;
            font-weight: 600 !important;
        }

        .row-measure td {
            background-color: #E0E0E0 !important;
            min-height: clamp(28px, calc(28px + 14px * (100vh - 600px) / 600px), 42px) !important;
            padding-top: clamp(8px, calc(8px + 4px * (100vh - 600px) / 600px), 12px) !important;
            padding-bottom: clamp(8px, calc(8px + 4px * (100vh - 600px) / 600px), 12px) !important;
        }

        .row-measure td:first-child {
            background-color: #E0E0E0 !important;
        }

        .row-account {
            background-color: white !important;
        }

        .row-category {
            background-color: white !important;
        }

        .row-product {
            background-color: white !important;
        }

        .row-readonly {
            background: repeating-linear-gradient(
                45deg,
                #ffffff,
                #ffffff 4px,
                #f5f5f5 4px,
                #f5f5f5 8px
            ) !important;
        }

        .row-readonly td {
            background: repeating-linear-gradient(
                45deg,
                #ffffff,
                #ffffff 4px,
                #f5f5f5 4px,
                #f5f5f5 8px
            ) !important;
        }

        .row-readonly:hover {
            background: repeating-linear-gradient(
                45deg,
                #fafafa,
                #fafafa 4px,
                #f0f0f0 4px,
                #f0f0f0 8px
            ) !important;
        }

        .row-readonly:hover td {
            background: repeating-linear-gradient(
                45deg,
                #fafafa,
                #fafafa 4px,
                #f0f0f0 4px,
                #f0f0f0 8px
            ) !important;
        }

        .grid-row:hover {
            background-color: #F5F9FF !important;
        }

        .row-measure-parent:hover {
            background-color: #E9E9E9 !important;
        }

        .row-measure:hover {
            background-color: #F3F3F3 !important;
        }

        .expand-icon {
            display: inline-block;
            width: 16px;
            height: 16px;
            margin-right: 4px;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
            color: #666;
        }

        .expand-icon:hover {
            color: #333;
        }

        .cell-value {
            text-align: right;
            font-family: 'Courier New', monospace;
            color: #000000 !important;
            font-weight: 500;
        }

        .cell-editable {
            cursor: pointer;
        }

        .cell-readonly {
            position: relative !important;
            cursor: help !important;
        }

        .readonly-badge-tooltip {
            display: none;
            position: fixed;
            padding: 8px 12px;
            background-color: #181818;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 11px;
            font-weight: normal;
            line-height: 14px;
            border-radius: 4px;
            white-space: normal;
            max-width: 280px;
            min-width: 220px;
            z-index: 999999;

        }
        
        .readonly-badge-tooltip * {
            font-weight: normal;
        }

        .readonly-badge-tooltip::after {
            content: '';
            position: absolute;
            top: calc(50% + 8px);
            left: -8px;
            transform: translateY(-50%);
            border: 8px solid transparent;
            border-right-color: #181818;
            border-left: none;
        }
        
        .cell-readonly:hover {
            background-color: rgba(0, 0, 0, 0.02) !important;
        }

        .row-hidden {
            display: none;
        }

        function formatValue(value, type) {

            if (value >= 1000) {

            }

        function getRowClass(row) {

            if (row.type === 'measure') return 'row-measure';

            if (row.type === 'category') return 'row-category';
            if (row.type === 'product') return 'row-product';
            return '';

            return '';

        function renderRow(row, parentExpanded = true, indentLevel = 0, parentAccessStatus = null) {
            const isVisible = parentExpanded;
            const hasChildren = row.children && row.children.length > 0;
            const expandIcon = hasChildren ? (row.expanded ? '⌄' : '>') : '';
            
            const indentPixels = row.level * 16;
            
            const isReadOnly = parentAccessStatus === 'read' && row.type !== 'measure';
            const readonlyClass = isReadOnly ? 'row-readonly' : '';
            
            const currentAccessStatus = row.accessStatus || parentAccessStatus;
            
            let accessBadge = '';
            if (row.type === 'measure' && row.accessStatus) {

                    accessBadge = ' <span class="readonly-badge" style="color: #d32f2f; font-size: 13px; font-weight: 700; background-color: #ffebee; padding: 2px 6px; border-radius: 3px; margin-left: 8px; cursor: help; position: relative; display: inline-block;" onmouseenter="showBadgeTooltip(event)" onmouseleave="hideBadgeTooltip(event)">READ ONLY<div class="readonly-badge-tooltip" style="display: none;">This measure is view only and not editable since it belongs to a measure group which has only read access for your role</div></span>';

                }
            }

            let html = `
                <tr data-id="${row.id}" data-level="${row.level}" class="${getRowClass(row)} ${readonlyClass} ${!isVisible ? 'row-hidden' : ''}">

                        ${row.name}${accessBadge}

            `;

                const isEditable = row.type !== 'measure-parent' &&

                                  (!row.accessStatus || row.accessStatus === 'write');
                const isReadOnlyCell = !isEditable && parentAccessStatus === 'read' && row.type !== 'measure-parent' && row.type !== 'measure';
                const cellClass = isEditable ? 'cell-editable' : (isReadOnlyCell ? 'cell-readonly' : '');
                
                const tooltipHtml = isReadOnlyCell ? '<div class="cell-readonly-tooltip">Cells in this measure group are view-only and not editable since this measure group is read-only for your role</div>' : '';
                const titleAttr = isReadOnlyCell ? ' title="Cells in this measure group are view-only and not editable since this measure group is read-only for your role"' : '';
                const mouseEvents = isReadOnlyCell ? ' onmouseenter="showTooltip(event)" onmouseleave="hideTooltip(event)"' : '';
                
                html += `
                    <td class="cell-value ${cellClass}" style="position: relative;"${titleAttr}${mouseEvents}>
                        ${displayValue}
                        ${tooltipHtml}
                    </td>
                `;
            });

            html += '</tr>';

            if (hasChildren && row.expanded && isVisible) {
                row.children.forEach(child => {
                    html += renderRow(child, row.expanded, indentLevel + 1, currentAccessStatus);
                });
            }

            return html;
        }

        function renderGrid() {
            const tbody = document.getElementById('grid-body');
            let html = '';
            // Render children directly without parent rows, adjusting their level to 0
            gridData.forEach(parent => {
                if (parent.children) {
                    parent.children.forEach(child => {
                        // Create a copy of the child with level adjusted to 0
                        const adjustedChild = { ...child, level: 0 };
                        html += renderRow(adjustedChild, true);
                    });
                }
            });
            tbody.innerHTML = html;
        }

        function toggleRow(id) {
            function findRow(data, targetId) {
                for (const row of data) {
                    if (row.id === targetId) {
                        return row;
                    }
                    if (row.children) {
                        const found = findRow(row.children, targetId);
                        if (found) return found;
                    }
                }
                return null;
            }

            const row = findRow(gridData, id);
            if (row) {
                row.expanded = !row.expanded;
                renderGrid();
            }
        }

        function showTooltip(event) {
            const cell = event.currentTarget;
            const tooltip = cell.querySelector('.cell-readonly-tooltip');
            if (tooltip) {
                const rect = cell.getBoundingClientRect();
                tooltip.style.display = 'block';
                const tooltipWidth = tooltip.offsetWidth || 250;
                tooltip.style.left = (rect.left + rect.width / 2 - tooltipWidth / 2) + 'px';
                tooltip.style.top = (rect.top - tooltip.offsetHeight - 12) + 'px';
            }
        }

        function hideTooltip(event) {
            const cell = event.currentTarget;
            const tooltip = cell.querySelector('.cell-readonly-tooltip');
            if (tooltip) {
                tooltip.style.display = 'none';
            }
        }

        function showBadgeTooltip(event) {
            event.stopPropagation();
            const badge = event.currentTarget;
            const tooltip = badge.querySelector('.readonly-badge-tooltip');
            if (tooltip) {
                const rect = badge.getBoundingClientRect();
                tooltip.style.display = 'block';
                tooltip.style.visibility = 'visible';
                tooltip.style.opacity = '1';
                tooltip.style.position = 'fixed';
                tooltip.style.zIndex = '999999';
                tooltip.style.fontSize = '11px';
                tooltip.style.fontWeight = 'normal';
                tooltip.style.fontFamily = '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
                tooltip.style.left = (rect.right + 12) + 'px';
                tooltip.style.top = (rect.top + rect.height / 2 - 15) + 'px';
                tooltip.style.transform = 'translateY(-50%)';
            }
        }

        function hideBadgeTooltip(event) {
            const badge = event.currentTarget;
            const tooltip = badge.querySelector('.readonly-badge-tooltip');
            if (tooltip) {
                tooltip.style.display = 'none';
                tooltip.style.visibility = 'hidden';
                tooltip.style.opacity = '0';
            }
        }

        renderGrid();
    </script>
</body>
</html>
